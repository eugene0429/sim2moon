# @package _global_
name: LunarYard
seed: 42
physics_dt: 0.0333
rendering_dt: 0.0333
enforce_realtime: true
mode: ROS2

lunaryard_settings:
  lab_length: 40.0
  lab_width: 40.0
  resolution: 0.02
  root_path: /LunarYard
  coordinates:
    latitude: 46.8
    longitude: -26.3

terrain_manager:
  sim_length: 40.0
  sim_width: 40.0
  resolution: 0.02
  root_path: /LunarYard
  texture_path: /LunarYard/Looks/Basalt
  dems_path: Terrains/Lunaryard
  moon_yard:
    is_yard: true
    crater_generator:
      profiles_path: assets/Terrains/crater_spline_profiles.pkl
      z_scale: 0.2
      seed: 42
    crater_distribution:
      densities: [0.025, 0.05, 0.5]
      radius: [[1.5, 2.5], [0.75, 1.5], [0.25, 0.5]]
      seed: 42
    base_terrain_generator:
      resolution: 0.02
      max_elevation: 0.5
      min_elevation: -0.5
      z_scale: 0.8
      seed: 42
    deformation_engine:
      enable: false

starfield_settings:
  enable: true

stellar_engine_settings:
  start_date:
    year: 2024
    month: 5
    day: 1
    hour: 12
    minute: 50
  time_scale: 36000
  update_interval: 600
  ephemeris_path: assets/Ephemeris

sun_settings:
  intensity: 1750.0
  angle: 0.53
  color: [1.0, 1.0, 1.0]
  temperature: 6500.0
  azimuth: 180.0
  elevation: 45.0

earth_settings:
  texture_path: assets/Textures/Earth/earth_color_with_clouds.tif
  scale: 50.0
  enable: true

rocks_settings:
  enable: true
  instancers_path: /LunarYard/Rocks
  assets_root: assets/USD_Assets/rocks
  rocks_settings:
    large_rocks:
      seed: 42
      collections: ["lunar_rocks/rocks_s2_r256"]
      realistic_distribution:
        method: background_scatter
        d_min: 0.5
        d_max: 2.0
        alpha: 2.2
        density: 0.3
    small_rocks:
      seed: 42
      collections: ["lunar_rocks/rocks_s2_r128"]
      realistic_distribution:
        method: background_scatter
        d_min: 0.1
        d_max: 0.5
        alpha: 2.5
        density: 1.0
