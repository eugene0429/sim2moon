# @package _global_
name: LunarYard
seed: 42
physics_dt: 0.0333
rendering_dt: 0.0333
enforce_realtime: true
mode: ROS2

lunaryard_settings:
  lab_length: 40.0
  lab_width: 40.0
  resolution: 0.02
  root_path: /LunarYard
  coordinates:
    latitude: -84.8
    longitude: 29.2

terrain_manager:
  sim_length: 40.0
  sim_width: 40.0
  resolution: 0.02
  root_path: /LunarYard
  texture_path: /LunarYard/Looks/LunarRegolith8k_antiTile
  dems_path: Terrains/Lunaryard
  mesh_position: [0, 0, 0]
  mesh_orientation: [0, 0, 0, 1]
  mesh_scale: [1, 1, 1]
  moon_yard:
    is_yard: false
    is_lab: true
    crater_generator:
      profiles_path: assets/Terrains/crater_spline_profiles.pkl
      min_xy_ratio: 0.85
      max_xy_ratio: 1.0
      resolution: 0.02
      pad_size: 500
      random_rotation: true
      z_scale: 0.2
      seed: 42
    crater_distribution:
      x_size: 40.0
      y_size: 40.0
      densities: [0.01, 0.02, 0.03]
      radius: [[1.5, 2.5], [0.75, 1.5], [0.25, 0.5]]
      num_repeat: 0
      seed: 42
    base_terrain_generator:
      x_size: 40.0
      y_size: 40.0
      resolution: 0.02
      max_elevation: 0.5
      min_elevation: -0.5
      z_scale: 0.8
      seed: 42
    deformation_engine:
      enable: false
      delay: 2.0
      terrain_width: 40.0
      terrain_height: 40.0
      terrain_resolution: 0.02
      footprint:
        width: 0.25
        height: 0.2
      deform_constrain:
        x_deform_offset: 0.0
        y_deform_offset: 0.0
        deform_decay_ratio: 0.01
      boundary_distribution:
        distribution: trapezoidal
        angle_of_repose: 1.047
      depth_distribution:
        distribution: sinusoidal
        wave_frequency: 4.14
      force_depth_regression:
        amplitude_slope: 0.00006
        amplitude_intercept: 0.008
        mean_slope: -0.00046
        mean_intercept: -0.0013

landscape_settings:
  enable: true
  dem_path: Terrains/SouthPole/Site01_final_adj_5mpp_surf
  crop_size: 500.0
  target_resolution: 10.0
  hole_margin: 2.0
  texture_path: /LunarYard/Looks/LunarRegolith8k_antiTile
  mesh_prim_path: /LunarYard/Landscape

stellar_engine_settings:
  start_date:
    year: 2025
    month: 2
    day: 7
    hour: 1
    minute: 1
  time_scale: 60000
  update_interval: 600
  ephemeris_path: assets/Ephemeris

sun_settings:
  intensity: 1750.0
  angle: 0.53
  diffuse_multiplier: 1.0
  specular_multiplier: 1.0
  color: [1.0, 1.0, 1.0]
  temperature: 6500.0
  azimuth: 180.0
  elevation: 45.0

earth_settings:
  texture_path: assets/Textures/Earth/earth_color_with_clouds.tif
  scale: 50.0
  enable: true

# Realistic rock distribution: crater rim ejecta + power-law sizes + overlap prevention
rocks_settings:
  enable: true
  instancers_path: /LunarYard/Rocks
  assets_root: assets/USD_Assets/rocks
  rocks_settings:
    crater_ejecta:
      seed: 42
      collections: ["apollo_rocks"]
      realistic_distribution:
        method: crater_ejecta
        resolution: 0.02
        min_gap: 0.05
        min_crater_radius: 1.5
        rocks_per_crater: 15
        rim_inner_ratio: 0.8
        rim_outer_ratio: 2.5
        decay_power: 2.0
        d_min: 3.0
        d_max: 8.0
        alpha: 2.2

    crater_wall_debris:
      seed: 42
      collections: ["apollo_rocks"]
      realistic_distribution:
        method: crater_wall_debris
        resolution: 0.02
        min_gap: 0.03
        min_crater_radius: 1.5
        rocks_per_crater: 20
        inner_radius_ratio: 0.1
        outer_radius_ratio: 0.9
        wall_bias: 2.0
        d_min: 1.0
        d_max: 5.0
        alpha: 2.5

    background_medium:
      seed: 42
      collections: ["apollo_rocks"]
      realistic_distribution:
        method: clustered_scatter
        resolution: 0.02
        min_gap: 0.03
        lambda_parent: 0.2
        lambda_daughter: 4
        sigma: 10.0
        d_min: 0.5
        d_max: 2.0
        alpha: 2.8

    background_small:
      seed: 42
      collections: ["apollo_rocks"]
      realistic_distribution:
        method: background_scatter
        resolution: 0.02
        min_gap: 0.01
        density: 0.5
        d_min: 0.2
        d_max: 1.0
        alpha: 3.0

robots_settings:
  uses_nucleus: false
  max_robots: 5
  robots_root: "/Robots"
  parameters:
    - robot_name: pragyaan
      usd_path: assets/USD_Assets/robots/pragyaan/nograph_pragyaan.usd
      pose:
        position: [26.0, 16.6, 0.8]
        orientation: [0.0, 0.0, 0.70711, 0.70711]
      domain_id: 0
      target_links:
        - "Mobility/Wheel_front_left"
        - "Mobility/Wheel_front_right"
        - "Mobility/Wheel_middle_left"
        - "Mobility/Wheel_middle_right"
        - "Mobility/Wheel_back_left"
        - "Mobility/Wheel_back_right"
      base_link: "base_link"
      dimensions:
        width: 1.6
        length: 1.5
      pos_relative_to_prim: "/StaticAssets/lander"
      wheel_joints:
        left: ["wheel_fl", "wheel_ml", "wheel_bl"]
        right: ["wheel_fr", "wheel_mr", "wheel_br"]
      camera:
        prim_path: "/Robots/pragyaan/Body/body_main/depth_cam"
        resolutions:
          low: [320, 240]
          high: [1440, 1080]
      imu_sensor_path: "/Robots/pragyaan/base_link/Imu_Sensor"
      turn_speed_coef: 19
      solar_panel_joint: "solarJoint"

static_assets_settings:
  root_path: "/StaticAssets"
  parameters:
    - asset_name: rock1
      usd_path: USD_Assets/rocks/lunalab_rocks/rock_1/rock1.usd
      pose:
        position: [28, 19.0, 0.0]
        orientation: [1, 0, 0, 1]
      collision: true

    - asset_name: lander
      usd_path: USD_Assets/common/lander/Vikram/Vikram.usd
      pose:
        position: [25.7, 10.6, 0.2]
        orientation: [0.5, 0.5, 0.5, 0.5]
      collision: true

    # - asset_name: background_landscape
    #   usd_path: Terrains/landscape_cropped/landscape_cropped.usd
    #   pose:
    #     position: [-20405.6, -9502.6, 561.8]
    #     orientation: [0, 0, 0, 1]
    #   collision: false
    #   material_override: /LunarYard/Looks/LunarRegolith8k_antiTile

monitoring_cameras:
  root_path: "/MonitoringCameras"
  camera_definitions:
    - name: "monitoring_camera"
      pose:
        position: [32.0, 22.0, 25.0]
        orientation: [0.082948, 0.091931, 0.700333, 0.702995]
      camera_params:
        focal_length: 1.93
        horizontal_aperture: 2.4
        vertical_aperture: 1.8
        fstop: 5.0
        focus_distance: 10.0
        clipping_range: [0.01, 1000000.0]
      sensor_type: "Rgb"
      resolution: [320, 240]
      ros2:
        topic: "/monitoring/monitoring_camera"
        frame_id: "monitoring_camera_id"
